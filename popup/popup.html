<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Emoji Copy</title>
  </head>
  <body>
    <div class="search-container">
      <div class="search-input">
        <img src="./images/search.svg" alt="" />
        <input type="text" id="emoji-search" placeholder="Buscar..." />
      </div>
    </div>

    <nav class="categories" id="emoji-categories">
      <!-- Categories will be rendered here -->
    </nav>

    <div class="message hidden" id="copy-message">
      <!-- Message will be displayed here -->
    </div>

    <div class="container">
      <div class="grid" id="emoji-list">
        <!-- Emojis will be rendered here -->
      </div>

      <span class="empty-message">
        Nenhum emoji encontrado. Tente outra busca.
      </span>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
